<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 320px;
      background: #ffffff;
      color: #1a1a1a;
    }

    .header {
      background: #2563eb;
      color: white;
      padding: 16px;
      text-align: center;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .header p {
      font-size: 11px;
      opacity: 0.8;
      margin-top: 2px;
    }

    .content {
      padding: 16px;
    }

    .product-name {
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .price-box {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      margin-bottom: 16px;
    }

    .price-label {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .price-value {
      font-size: 28px;
      font-weight: 700;
      color: #16a34a;
    }

    .site-badge {
      font-size: 11px;
      background: #eff6ff;
      color: #2563eb;
      padding: 2px 8px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 16px;
    }

    .track-btn {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .track-btn:hover { background: #1d4ed8; }
    .track-btn:disabled { background: #93c5fd; cursor: not-allowed; }

    .success-msg {
      display: none;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #16a34a;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
    }

    .error-msg {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
    }

    .no-product {
      text-align: center;
      padding: 24px 16px;
      color: #6b7280;
      font-size: 13px;
    }

    .no-product .icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>💰 Price Tracker</h1>
    <p>Track prices across any site</p>
  </div>

  <div class="content" id="content">
    <div class="no-product" id="loading">
      <div class="icon">⏳</div>
      <p>Detecting product...</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
